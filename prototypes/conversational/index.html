<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request an Appointment — Fish Family Medicine</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f5f9;
      height: 100vh;
      display: flex;
      flex-direction: column;
      color: #1e293b;
      font-size: 14px;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      background: white;
      border-bottom: 1px solid #e2e8f0;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .chat-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, #0d9488, #0891b2);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: white;
    }
    .chat-header-info h2 {
      font-size: 14px; font-weight: 700; color: #0f172a;
    }
    .chat-header-info p {
      font-size: 12px; color: #94a3b8; display: flex; align-items: center; gap: 4px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #22c55e;
    }

    /* Messages */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      gap: 8px;
      max-width: 85%;
    }
    .message.system {
      align-self: flex-start;
    }
    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, #0d9488, #0891b2);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: white;
      flex-shrink: 0; margin-top: 2px;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.55;
    }
    .message.system .bubble {
      background: white;
      border: 1px solid #e2e8f0;
      border-bottom-left-radius: 4px;
      color: #1e293b;
    }
    .message.user .bubble {
      background: #0d9488;
      color: white;
      border-bottom-right-radius: 4px;
    }

    /* Typing indicator */
    .typing-indicator {
      display: none;
      align-self: flex-start;
    }
    .typing-indicator.visible { display: flex; gap: 8px; align-items: flex-end; }
    .typing-dots {
      background: white; border: 1px solid #e2e8f0;
      border-radius: 16px; border-bottom-left-radius: 4px;
      padding: 10px 14px;
      display: flex; gap: 4px; align-items: center;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%; background: #94a3b8;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input area */
    .input-area {
      background: white;
      border-top: 1px solid #e2e8f0;
      padding: 12px 16px;
      flex-shrink: 0;
    }

    .quick-replies {
      display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 10px;
    }
    .quick-reply {
      border: 1.5px solid #0d9488;
      background: white; color: #0d9488;
      border-radius: 999px; padding: 6px 14px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      transition: all 120ms; font-family: inherit; user-select: none;
    }
    .quick-reply:hover { background: #0d9488; color: white; }

    .text-input-row {
      display: flex; gap: 8px;
    }
    .text-input {
      flex: 1; border: 1px solid #d1d5db; border-radius: 8px;
      padding: 9px 12px; font-size: 13px; font-family: inherit;
      outline: none; transition: border-color 150ms; color: #1e293b;
    }
    .text-input:focus { border-color: #0d9488; box-shadow: 0 0 0 3px rgba(13,148,136,0.1); }
    .send-btn {
      background: #0d9488; color: white; border: none; border-radius: 8px;
      padding: 9px 16px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background 150ms;
      white-space: nowrap;
    }
    .send-btn:hover { background: #0f766e; }
    .send-btn:disabled { opacity: 0.4; cursor: default; }

    /* Complete state */
    .complete-actions {
      display: none; padding: 4px 0;
    }
    .complete-actions.visible { display: block; }
    .restart-btn {
      background: none; border: 1px solid #d1d5db; border-radius: 8px;
      padding: 9px 20px; font-size: 13px; color: #6b7280;
      cursor: pointer; font-family: inherit; width: 100%;
      transition: all 150ms;
    }
    .restart-btn:hover { border-color: #9ca3af; color: #374151; }
  </style>
</head>
<body>
  <div class="chat-header">
    <div class="chat-avatar">FF</div>
    <div class="chat-header-info">
      <h2>Fish Family Medicine</h2>
      <p><span class="status-dot"></span> Online</p>
    </div>
  </div>

  <div class="messages-area" id="messagesArea"></div>

  <div class="typing-indicator" id="typingIndicator">
    <div class="msg-avatar">FF</div>
    <div class="typing-dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <div class="input-area">
    <div class="quick-replies" id="quickReplies"></div>
    <div class="text-input-row" id="textInputRow">
      <input type="text" class="text-input" id="textInput" placeholder="Type a message..." />
      <button class="send-btn" id="sendBtn" onclick="handleSend()">Send</button>
    </div>
    <div class="complete-actions" id="completeActions">
      <button class="restart-btn" onclick="resetChat()">Start a new request</button>
    </div>
  </div>

  <script type="module">
    import { initBridge, emitStateChange } from '../_shared/stateframe-bridge.js'

    const defaultState = {
      messages: [
        { from: 'system', text: 'Welcome to Fish Family Medicine! Are you a new or returning patient?' }
      ],
      currentQuestion: 'new-or-returning',
      patientName: '', patientDob: '', patientPhone: '', patientEmail: '',
      isNewPatient: null, provider: null, appointmentType: null,
      preferredDate: '', preferredTime: null, reason: '',
      insuranceProvider: '', insuranceMemberId: '', submitted: false,
    }

    let state = { ...defaultState, messages: [...defaultState.messages] }

    const QUICK_REPLIES = {
      'new-or-returning': ['New Patient', 'Returning Patient'],
      'appointment-type': ['Checkup', 'Sick Visit', 'Follow-Up', 'Physical', 'Other'],
      'provider': ['Dr. Fish', 'Dr. Brooks', 'Nurse Practitioner', 'No Preference'],
      'time-preference': ['Mornings', 'Afternoons', 'No Preference'],
      'reason-followup': [],
      'complete': [],
    }

    const NEXT_QUESTION = {
      'new-or-returning': 'appointment-type',
      'appointment-type': 'reason',
      'reason': 'provider',
      'reason-followup': 'provider',
      'provider': 'time-preference',
      'time-preference': 'date',
      'date': 'contact',
      'contact': 'insurance',
      'insurance': 'complete',
    }

    const SYSTEM_MESSAGES = {
      'appointment-type': (s) => s.isNewPatient
        ? "Welcome! We're glad you chose us. What kind of appointment are you looking for?"
        : `Welcome back! What kind of appointment are you looking for?`,
      'reason': () => "Got it. Can you briefly describe your reason for visiting?",
      'reason-followup': () => "Thanks for sharing that. Is there anything else we should know?",
      'provider': (s) => s.patientName
        ? `Thanks, ${s.patientName.split(' ')[0]}! Do you have a preferred provider?`
        : "Do you have a preferred provider?",
      'time-preference': () => "Great! Do mornings or afternoons work better for you?",
      'date': () => "What date works best for you? (You can type a date or say 'next week')",
      'contact': (s) => s.patientName ? `Almost done! We'll need a phone number and email to confirm.` : "Almost done! What's the best way to reach you?",
      'insurance': () => "Do you have insurance? If so, what's your provider and member ID? (Type 'none' or 'self-pay' to skip)",
      'complete': () => "Your appointment request has been submitted! We'll confirm by email within 24 hours. Is there anything else I can help with?",
    }

    function render() {
      renderMessages()
      renderInput()
    }

    function renderMessages() {
      const area = document.getElementById('messagesArea')
      area.innerHTML = state.messages.map(msg => {
        if (msg.from === 'system') {
          return `<div class="message system">
            <div class="msg-avatar">FF</div>
            <div class="bubble">${escapeHtml(msg.text)}</div>
          </div>`
        } else {
          return `<div class="message user">
            <div class="bubble">${escapeHtml(msg.text)}</div>
          </div>`
        }
      }).join('')
    }

    function renderInput() {
      const q = state.currentQuestion
      const qr = document.getElementById('quickReplies')
      const textRow = document.getElementById('textInputRow')
      const completeActions = document.getElementById('completeActions')

      if (q === 'complete') {
        qr.innerHTML = ''
        textRow.style.display = 'none'
        completeActions.classList.add('visible')
        return
      }

      completeActions.classList.remove('visible')
      textRow.style.display = 'flex'

      const replies = QUICK_REPLIES[q] || []
      qr.innerHTML = replies.map(r =>
        `<button class="quick-reply" onclick="handleQuickReply(${JSON.stringify(r)})">${escapeHtml(r)}</button>`
      ).join('')

      const input = document.getElementById('textInput')
      input.value = ''

      const placeholders = {
        'new-or-returning': 'Or type your response...',
        'appointment-type': 'Or describe what you need...',
        'reason': 'Describe your symptoms or reason...',
        'reason-followup': 'Add any additional details...',
        'provider': 'Or type a preference...',
        'time-preference': 'Or tell us your availability...',
        'date': 'e.g., March 20, or next Tuesday',
        'contact': 'Phone number, email, or both',
        'insurance': 'Insurance provider & member ID, or "none"',
      }
      input.placeholder = placeholders[q] || 'Type a message...'
    }

    function addMessage(from, text) {
      state.messages = [...state.messages, { from, text }]
    }

    function processUserInput(text) {
      const q = state.currentQuestion
      const textLower = text.toLowerCase()

      const stateUpdates = {}

      if (q === 'new-or-returning') {
        stateUpdates.isNewPatient = textLower.includes('new')
      } else if (q === 'appointment-type') {
        if (textLower.includes('sick')) stateUpdates.appointmentType = 'sick-visit'
        else if (textLower.includes('follow')) stateUpdates.appointmentType = 'follow-up'
        else if (textLower.includes('physical')) stateUpdates.appointmentType = 'physical'
        else if (textLower.includes('check')) stateUpdates.appointmentType = 'checkup'
        else stateUpdates.appointmentType = 'other'
      } else if (q === 'reason') {
        stateUpdates.reason = text
      } else if (q === 'reason-followup') {
        // append to reason
        if (text.toLowerCase() !== 'no' && text.toLowerCase() !== 'nope') {
          stateUpdates.reason = (state.reason ? state.reason + '. ' : '') + text
        }
      } else if (q === 'provider') {
        if (textLower.includes('fish')) stateUpdates.provider = 'dr-fish'
        else if (textLower.includes('brook')) stateUpdates.provider = 'dr-brooks'
        else if (textLower.includes('nurse') || textLower.includes('np')) stateUpdates.provider = 'nurse-practitioner'
        else stateUpdates.provider = 'any'
      } else if (q === 'time-preference') {
        if (textLower.includes('morning')) stateUpdates.preferredTime = 'morning'
        else if (textLower.includes('afternoon')) stateUpdates.preferredTime = 'afternoon'
        else stateUpdates.preferredTime = 'any'
      } else if (q === 'date') {
        stateUpdates.preferredDate = text
      } else if (q === 'contact') {
        // Try to extract name from message if we don't have it
        if (!state.patientName) stateUpdates.patientName = text
        else {
          const emailMatch = text.match(/\S+@\S+/)
          const phoneMatch = text.match(/[\d\-\(\)\s]{7,}/)
          if (emailMatch) stateUpdates.patientEmail = emailMatch[0]
          if (phoneMatch) stateUpdates.patientPhone = phoneMatch[0].trim()
        }
      } else if (q === 'insurance') {
        if (!textLower.includes('none') && !textLower.includes('self')) {
          stateUpdates.insuranceProvider = text
        }
      }

      return stateUpdates
    }

    function getNextQuestion(current) {
      // Custom logic for some transitions
      if (current === 'new-or-returning') return 'appointment-type'
      if (current === 'appointment-type') return 'reason'
      if (current === 'reason') return 'reason-followup'
      if (current === 'reason-followup') return 'provider'
      if (current === 'provider') return 'time-preference'
      if (current === 'time-preference') return 'date'
      if (current === 'date') return 'contact'
      if (current === 'contact') return 'insurance'
      if (current === 'insurance') return 'complete'
      return 'complete'
    }

    function addSystemResponse(nextQuestion) {
      const msgFn = SYSTEM_MESSAGES[nextQuestion]
      if (msgFn) {
        addMessage('system', msgFn(state))
      }
      if (nextQuestion === 'complete') {
        state.submitted = true
      }
    }

    window.handleQuickReply = function(text) {
      handleInput(text)
    }

    window.handleSend = function() {
      const input = document.getElementById('textInput')
      const text = input.value.trim()
      if (!text) return
      input.value = ''
      handleInput(text)
    }

    document.getElementById('textInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.handleSend()
    })

    function handleInput(text) {
      addMessage('user', text)
      const updates = processUserInput(text)
      Object.assign(state, updates)

      const nextQ = getNextQuestion(state.currentQuestion)
      state.currentQuestion = nextQ
      addSystemResponse(nextQ)

      render()
      emitStateChange(state)

      // Scroll to bottom
      setTimeout(() => {
        const area = document.getElementById('messagesArea')
        area.scrollTop = area.scrollHeight
      }, 50)
    }

    window.resetChat = function() {
      state = { ...defaultState, messages: [...defaultState.messages] }
      render()
      emitStateChange(state)
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
    }

    initBridge({
      defaultState,
      getState: () => state,
      setState: (newState) => {
        state = {
          ...defaultState,
          ...newState,
          messages: Array.isArray(newState.messages) ? newState.messages : defaultState.messages,
        }
        render()
        // Scroll to restored position handled by bridge
      },
    })

    render()
  </script>
</body>
</html>
